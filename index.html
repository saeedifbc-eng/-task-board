<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>برنامه کار‌های شرکت</title>
  
  <!-- فونت وزیر -->
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/font-face.css" rel="stylesheet" type="text/css" />
  
  <style>
    * {
      box-sizing: border-box;
      font-family: Vazir, 'Segoe UI', Tahoma, sans-serif;
    }
    body {
      background: #0f0f14;
      color: #eaeaea;
      padding: 20px;
      direction: rtl;
      text-align: right;
    }
    .container {
      max-width: 1000px;
      margin: auto;
    }
    h1 {
      color: #fff;
      text-align: center;
      margin-bottom: 5px;
      font-weight: normal;
    }
    .year-badge {
      text-align: center;
      color: #4c6fff;
      font-size: 1.2rem;
      margin-bottom: 20px;
    }

    /* فرم افزودن تسک */
    .task-form {
      background: #1a1a24;
      padding: 20px;
      border-radius: 24px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 25px;
    }
    .task-form input, .task-form select, .task-form textarea {
      background: #252535;
      border: none;
      padding: 10px 14px;
      border-radius: 30px;
      color: white;
      outline: none;
      font-size: 0.9rem;
      min-width: 120px;
      font-family: Vazir, 'Segoe UI', Tahoma, sans-serif;
    }
    .task-form textarea {
      min-width: 160px;
      resize: vertical;
      height: 45px;
    }
    .task-form button {
      background: #4c6fff;
      border: none;
      padding: 10px 28px;
      border-radius: 30px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      font-family: Vazir, 'Segoe UI', Tahoma, sans-serif;
    }
    .task-form button:hover {
      background: #3a56d4;
      transform: scale(1.02);
    }

    /* انتخاب ماه */
    .month-selector {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
    }
    .month-selector select {
      background: #1f1f2e;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 1.1rem;
      min-width: 150px;
      cursor: pointer;
      font-family: Vazir, 'Segoe UI', Tahoma, sans-serif;
    }
    .month-selector button {
      background: #333;
      border: none;
      color: white;
      padding: 8px 18px;
      border-radius: 30px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: 0.2s;
      font-family: Vazir, 'Segoe UI', Tahoma, sans-serif;
    }
    .month-selector button:hover {
      background: #555;
    }

    /* تقویم */
    .calendar-wrapper {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .month-grid {
      background: #161620;
      border-radius: 28px;
      padding: 20px 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    }
    .month-title {
      font-size: 1.8rem;
      font-weight: bold;
      color: #fff;
      text-align: center;
      margin-bottom: 15px;
      letter-spacing: 2px;
    }
    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-bottom: 10px;
      font-weight: bold;
      color: #aaa;
      text-align: center;
    }
    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }
    .day-cell {
      background: #1f1f2e;
      border-radius: 16px;
      padding: 10px 5px;
      min-height: 80px;
      cursor: pointer;
      transition: 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1px solid transparent;
    }
    .day-cell:hover {
      background: #2a2a3e;
      border-color: #4c6fff;
    }
    .day-cell .day-number {
      font-weight: bold;
      font-size: 1.1rem;
      color: #ddd;
    }
    .day-cell .task-indicator {
      font-size: 0.7rem;
      color: #4c6fff;
      margin-top: 4px;
      background: #252540;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .day-cell.has-task {
      border-color: #4c6fff55;
    }
    .day-cell.today {
      border-color: #ffbb33;
      background: #2a2a2a;
    }
    .empty-cell {
      background: transparent;
      pointer-events: none;
    }

    /* لیست تسک‌های روز */
    .day-detail {
      background: #161620;
      border-radius: 28px;
      padding: 20px;
      margin-top: 10px;
    }
    .day-detail h3 {
      color: #fff;
      margin: 0 0 12px 0;
      font-weight: normal;
    }
    .task-card {
      background: #222235;
      border-radius: 16px;
      padding: 12px 16px;
      margin-bottom: 10px;
      border-right: 4px solid #4c6fff;
    }
    .task-card.done {
      opacity: 0.6;
      border-right-color: #2e7d32;
    }
    .task-card small {
      color: #aaa;
      display: block;
    }
    .task-card .actions {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .task-card button {
      background: #333;
      border: none;
      color: white;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: 0.15s;
      font-family: Vazir, 'Segoe UI', Tahoma, sans-serif;
    }
    .task-card button:hover {
      background: #555;
    }
    .task-card .btn-done { background: #2e7d32; }
    .task-card .btn-done:hover { background: #1e5a22; }
    .task-card .btn-del { background: #8b2d2d; }
    .task-card .btn-del:hover { background: #6b1f1f; }

    /* فیلترها */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 15px 0;
      justify-content: center;
    }
    .filters select {
      background: #1f1f2e;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 30px;
      font-family: Vazir, 'Segoe UI', Tahoma, sans-serif;
    }

    @media (max-width: 700px) {
      .day-cell { min-height: 60px; padding: 6px 2px; }
      .task-form input, .task-form select, .task-form textarea { min-width: 100px; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>📋 برنامه کار‌های شرکت</h1>
  <div class="year-badge">سال ۱۴۰۵ شمسی</div>

  <!-- فرم افزودن تسک -->
  <div class="task-form">
    <input id="taskTitle" placeholder="عنوان تسک">
    <textarea id="taskDesc" placeholder="توضیحات (اختیاری)"></textarea>
    <select id="taskUser">
      <option value="Saeed">سعید</option>
      <option value="Mohammadreza">محمدرضا</option>
    </select>
    <button onclick="addTask()">➕ افزودن تسک</button>
  </div>

  <!-- فیلترها -->
  <div class="filters">
    <select id="filterUser" onchange="renderCalendar()">
      <option value="All">همه کاربران</option>
      <option value="Saeed">سعید</option>
      <option value="Mohammadreza">محمدرضا</option>
    </select>
    <select id="filterDay" onchange="renderCalendar()">
      <option value="All">همه روزها</option>
      <option value="Saturday">شنبه</option>
      <option value="Sunday">یکشنبه</option>
      <option value="Monday">دوشنبه</option>
      <option value="Tuesday">سه‌شنبه</option>
      <option value="Wednesday">چهارشنبه</option>
      <option value="Thursday">پنجشنبه</option>
      <option value="Friday">جمعه</option>
    </select>
  </div>

  <!-- انتخاب ماه برای نمایش -->
  <div class="month-selector">
    <button onclick="changeMonth(-1)">◀</button>
    <select id="monthSelect" onchange="renderCalendar()">
      <option value="0">فروردین</option>
      <option value="1">اردیبهشت</option>
      <option value="2">خرداد</option>
      <option value="3">تیر</option>
      <option value="4">مرداد</option>
      <option value="5">شهریور</option>
      <option value="6">مهر</option>
      <option value="7">آبان</option>
      <option value="8">آذر</option>
      <option value="9">دی</option>
      <option value="10">بهمن</option>
      <option value="11">اسفند</option>
    </select>
    <button onclick="changeMonth(1)">▶</button>
  </div>

  <!-- تقویم و جزئیات روز -->
  <div class="calendar-wrapper">
    <div id="calendarContainer"></div>
    <div id="dayDetail" class="day-detail">
      <h3>📌 تسک‌های امروز</h3>
      <div id="dayTaskList">روزی را انتخاب کنید</div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
