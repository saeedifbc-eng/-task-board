<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>برنامه کار‌های شرکت</title>
  
  <!-- فونت وزیر -->
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/font-face.css" rel="stylesheet" type="text/css" />
  
  <style>
    * {
      box-sizing: border-box;
      font-family: Vazir, 'Segoe UI', Tahoma, sans-serif;
    }
    body {
      background: #0f0f14;
      color: #eaeaea;
      padding: 10px;
      direction: rtl;
      text-align: right;
      margin: 0;
      min-height: 100vh;
    }
    .container {
      max-width: 1000px;
      margin: auto;
      padding-top: 5px;
    }
    
    /* هدر با دکمه sticky */
    .header-sticky {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #0f0f14;
      padding: 8px 0 6px 0;
      border-bottom: 1px solid #1a1a2e;
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }
    .header-sticky h1 {
      color: #fff;
      margin: 0;
      font-weight: normal;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .header-sticky h1 span {
      font-size: 1.2rem;
    }
    .header-sticky .btn-today {
      background: linear-gradient(135deg, #4c6fff, #6a3de8);
      border: none;
      padding: 6px 14px;
      border-radius: 30px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      font-family: Vazir, 'Segoe UI', Tahoma, sans-serif;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      gap: 4px;
      box-shadow: 0 4px 15px rgba(76, 111, 255, 0.3);
      white-space: nowrap;
    }
    .header-sticky .btn-today:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(76, 111, 255, 0.5);
    }
    .header-sticky .btn-today:active {
      transform: scale(0.95);
    }
    
    .year-badge {
      text-align: center;
      color: #4c6fff;
      font-size: 1rem;
      margin: 6px 0 12px 0;
    }

    /* فرم افزودن تسک - بهینه موبایل */
    .task-form {
      background: #1a1a24;
      padding: 14px;
      border-radius: 20px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .task-form input, .task-form select, .task-form textarea {
      background: #252535;
      border: none;
      padding: 8px 12px;
      border-radius: 30px;
      color: white;
      outline: none;
      font-size: 0.85rem;
      min-width: 80px;
      flex: 1 1 auto;
      font-family: Vazir, 'Segoe UI', Tahoma, sans-serif;
    }
    .task-form textarea {
      min-width: 100px;
      resize: vertical;
      height: 38px;
      flex: 2 1 auto;
    }
    .task-form button {
      background: #4c6fff;
      border: none;
      padding: 8px 18px;
      border-radius: 30px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      font-family: Vazir, 'Segoe UI', Tahoma, sans-serif;
      font-size: 0.85rem;
      flex: 1 1 auto;
      min-width: 80px;
    }
    .task-form button:hover {
      background: #3a56d4;
      transform: scale(1.02);
    }

    /* انتخاب ماه - بهینه موبایل */
    .month-selector {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .month-selector select {
      background: #1f1f2e;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 30px;
      font-size: 0.95rem;
      min-width: 120px;
      cursor: pointer;
      font-family: Vazir, 'Segoe UI', Tahoma, sans-serif;
    }
    .month-selector button {
      background: #333;
      border: none;
      color: white;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      font-family: Vazir, 'Segoe UI', Tahoma, sans-serif;
    }
    .month-selector button:hover {
      background: #555;
    }
    .month-selector button:active {
      transform: scale(0.9);
    }

    /* تقویم - بهینه موبایل */
    .calendar-wrapper {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .month-grid {
      background: #161620;
      border-radius: 20px;
      padding: 12px 8px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    }
    .month-title {
      font-size: 1.3rem;
      font-weight: bold;
      color: #fff;
      text-align: center;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }
    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      margin-bottom: 6px;
      font-weight: bold;
      color: #aaa;
      text-align: center;
      font-size: 0.65rem;
    }
    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }
    .day-cell {
      border-radius: 12px;
      padding: 6px 2px;
      min-height: 50px;
      cursor: pointer;
      transition: 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid transparent;
      position: relative;
      background: #1f1f2e;
      -webkit-tap-highlight-color: transparent;
    }
    .day-cell:active {
      transform: scale(0.92);
    }
    .day-cell .day-number {
      font-weight: bold;
      font-size: 0.85rem;
      color: #ddd;
    }
    .day-cell.today {
      border-color: #ffbb33;
      background: #2a2a1a !important;
    }
    .day-cell.today .day-number {
      color: #ffbb33;
    }
    .day-cell.all-done {
      background: #1a3a2a;
      border-color: #2e7d32;
    }
    .day-cell.all-done .day-number {
      color: #4caf50;
    }
    .day-cell.has-unfinished {
      background: #3d2a1a;
      border-color: #e67e22;
    }
    .day-cell.has-unfinished .day-number {
      color: #e67e22;
    }
    .empty-cell {
      background: transparent !important;
      pointer-events: none;
      border-color: transparent !important;
    }
    .day-cell .selected-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #4caf50;
      border-radius: 50%;
      box-shadow: 0 0 6px #4caf50;
      margin-top: 2px;
    }

    /* لیست تسک‌های روز - بهینه موبایل */
    .day-detail {
      background: #161620;
      border-radius: 20px;
      padding: 14px;
      margin-top: 6px;
    }
    .day-detail h3 {
      color: #fff;
      margin: 0 0 10px 0;
      font-weight: normal;
      font-size: 1rem;
    }
    .task-card {
      background: #222235;
      border-radius: 14px;
      padding: 10px 12px;
      margin-bottom: 8px;
      border-right: 4px solid #4c6fff;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .task-card .task-info {
      flex: 1;
    }
    .task-card .task-info b {
      display: block;
      font-size: 0.9rem;
    }
    .task-card .task-info small {
      color: #aaa;
      display: block;
      font-size: 0.7rem;
    }
    .task-card .task-actions {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .task-card .task-actions button {
      background: #333;
      border: none;
      color: white;
      padding: 3px 10px;
      border-radius: 30px;
      font-size: 0.65rem;
      cursor: pointer;
      transition: 0.15s;
      font-family: Vazir, 'Segoe UI', Tahoma, sans-serif;
    }
    .task-card .task-actions button:active {
      transform: scale(0.9);
    }
    .task-card .task-actions button:hover {
      background: #555;
    }
    .task-card .task-actions .btn-done { background: #2e7d32; }
    .task-card .task-actions .btn-done:hover { background: #1e5a22; }
    .task-card .task-actions .btn-del { background: #8b2d2d; }
    .task-card .task-actions .btn-del:hover { background: #6b1f1f; }
    .task-card.done {
      opacity: 0.6;
    }

    /* رنگ‌بندی کاربران */
    .task-card.user-saeed { border-right-color: #4c6fff; }
    .task-card.user-mohammadreza { border-right-color: #9c27b0; }
    .task-card .user-badge {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 20px;
      font-size: 0.6rem;
      font-weight: bold;
      margin-left: 4px;
    }
    .user-badge.saeed { background: #4c6fff33; color: #4c6fff; }
    .user-badge.mohammadreza { background: #9c27b033; color: #9c27b0; }

    /* فیلترها - بهینه موبایل */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0;
      justify-content: center;
    }
    .filters select {
      background: #1f1f2e;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 30px;
      font-family: Vazir, 'Segoe UI', Tahoma, sans-serif;
      font-size: 0.75rem;
      flex: 1 1 auto;
      min-width: 80px;
    }

    /* بهبود برای موبایل‌های خیلی کوچک */
    @media (max-width: 480px) {
      body { padding: 6px; }
      .header-sticky h1 { font-size: 0.9rem; }
      .header-sticky .btn-today { font-size: 0.65rem; padding: 5px 10px; }
      .day-cell { min-height: 40px; padding: 4px 1px; }
      .day-cell .day-number { font-size: 0.7rem; }
      .weekdays { font-size: 0.55rem; gap: 2px; }
      .days-grid { gap: 2px; }
      .month-title { font-size: 1rem; }
      .task-form input, .task-form select { font-size: 0.75rem; padding: 6px 10px; min-width: 60px; }
      .task-form textarea { font-size: 0.75rem; height: 32px; }
      .task-form button { font-size: 0.75rem; padding: 6px 12px; }
      .month-selector select { font-size: 0.8rem; padding: 6px 10px; min-width: 90px; }
      .month-selector button { padding: 4px 10px; font-size: 0.8rem; }
      .day-cell .selected-dot { width: 6px; height: 6px; }
      .filters select { font-size: 0.65rem; padding: 4px 8px; min-width: 60px; }
      .task-card .task-info b { font-size: 0.8rem; }
      .task-card .task-actions button { font-size: 0.55rem; padding: 2px 8px; }
    }

    @media (max-width: 380px) {
      .day-cell { min-height: 35px; }
      .day-cell .day-number { font-size: 0.6rem; }
      .weekdays { font-size: 0.45rem; }
      .header-sticky h1 { font-size: 0.75rem; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- هدر Sticky با دکمه تسک‌های امروز -->
  <div class="header-sticky">
    <h1><span>📋</span> برنامه کار‌های شرکت</h1>
    <button class="btn-today" onclick="goToToday()">
      📅 امروز
    </button>
  </div>

  <div class="year-badge">سال ۱۴۰۵ شمسی</div>

  <!-- فرم افزودن تسک -->
  <div class="task-form">
    <input id="taskTitle" placeholder="عنوان تسک">
    <textarea id="taskDesc" placeholder="توضیحات"></textarea>
    <select id="taskUser">
      <option value="Saeed">سعید</option>
      <option value="Mohammadreza">محمدرضا</option>
    </select>
    <button onclick="addTask()">➕ افزودن</button>
  </div>

  <!-- فیلترها -->
  <div class="filters">
    <select id="filterUser" onchange="renderCalendar()">
      <option value="All">همه کاربران</option>
      <option value="Saeed">سعید</option>
      <option value="Mohammadreza">محمدرضا</option>
    </select>
    <select id="filterDay" onchange="renderCalendar()">
      <option value="All">همه روزها</option>
      <option value="Saturday">شنبه</option>
      <option value="Sunday">یکشنبه</option>
      <option value="Monday">دوشنبه</option>
      <option value="Tuesday">سه‌شنبه</option>
      <option value="Wednesday">چهارشنبه</option>
      <option value="Thursday">پنجشنبه</option>
      <option value="Friday">جمعه</option>
    </select>
  </div>

  <!-- انتخاب ماه برای نمایش -->
  <div class="month-selector">
    <button onclick="changeMonth(-1)">◀</button>
    <select id="monthSelect" onchange="renderCalendar()">
      <option value="0">فروردین</option>
      <option value="1">اردیبهشت</option>
      <option value="2">خرداد</option>
      <option value="3">تیر</option>
      <option value="4">مرداد</option>
      <option value="5">شهریور</option>
      <option value="6">مهر</option>
      <option value="7">آبان</option>
      <option value="8">آذر</option>
      <option value="9">دی</option>
      <option value="10">بهمن</option>
      <option value="11">اسفند</option>
    </select>
    <button onclick="changeMonth(1)">▶</button>
  </div>

  <!-- تقویم و جزئیات روز -->
  <div class="calendar-wrapper">
    <div id="calendarContainer"></div>
    <div id="dayDetail" class="day-detail">
      <h3>📌 تسک‌های امروز</h3>
      <div id="dayTaskList">روزی را انتخاب کنید</div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
