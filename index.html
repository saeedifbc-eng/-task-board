<!DOCTYPE html>
<html>
<head>
  <title>Task Board</title>

  <style>
    body {
      font-family: Arial;
      background: #0f0f14;
      color: #eaeaea;
      margin: 20px;
    }

    h1 {
      color: #fff;
    }

    input, select, button, textarea {
      padding: 10px;
      margin: 5px;
      border-radius: 12px;
      border: none;
      outline: none;
    }

    input, select, textarea {
      background: #1c1c26;
      color: white;
    }

    textarea {
      width: 300px;
      height: 80px;
      resize: none;
    }

    button {
      background: #4c6fff;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #3a56d4;
    }

    .board {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .column {
      flex: 1;
      background: #161620;
      border-radius: 20px;
      padding: 15px;
      min-height: 300px;
    }

    .card {
      background: #222235;
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .card:hover {
      transform: scale(1.02);
      transition: 0.2s;
    }

    .done {
      background: #1f3a2a;
    }

    small {
      color: #aaa;
    }
  </style>
</head>

<body>

<h1>Team Task Board</h1>

<select id="user">
  <option value="Saeed">Saeed</option>
  <option value="Moti">Moti</option>
</select>

<select id="day">
  <option value="Saturday">شنبه</option>
  <option value="Sunday">یکشنبه</option>
  <option value="Monday">دوشنبه</option>
  <option value="Tuesday">سه‌شنبه</option>
  <option value="Wednesday">چهارشنبه</option>
  <option value="Thursday">پنجشنبه</option>
  <option value="Friday">جمعه</option>
</select>

<br>

<input id="title" placeholder="Title">

<!-- FIXED: multiline description -->
<br>
<textarea id="desc" placeholder="Description (you can write 2-3 lines)"></textarea>

<br>

<button onclick="addTask()">Add Task</button>

<hr>

<select id="filterUser" onchange="renderTasks()">
  <option value="All">All Users</option>
  <option value="Saeed">Saeed</option>
  <option value="Moti">Moti</option>
</select>

<select id="filterDay" onchange="renderTasks()">
  <option value="All">All Days</option>
  <option value="Saturday">شنبه</option>
  <option value="Sunday">یکشنبه</option>
  <option value="Monday">دوشنبه</option>
  <option value="Tuesday">سه‌شنبه</option>
  <option value="Wednesday">چهارشنبه</option>
  <option value="Thursday">پنجشنبه</option>
  <option value="Friday">جمعه</option>
</select>

<div class="board">
  <div class="column">
    <h3>Tasks</h3>
    <div id="taskList"></div>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
